name: Continuous NBA Odds Update
on:
  schedule:
    - cron: '0 * * * *' # Runs exactly every hour, 24/7
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run Scraper
        run: python scrape_nba.py
      - name: Commit and Push
        run: |
          git config --global user.name "NBA-Bot"
          git config --global user.email "bot@nba-smart-tips.com"
          git add data.json
          git commit -m "Hourly Market Update [$(date)]" || exit 0
          git push
