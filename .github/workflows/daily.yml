name: ParlAID — Live NBA Sync v4

on:
  schedule:
    - cron: '*/20 11-13 * * *'
    - cron: '*/20 22-23 * * *'
    - cron: '*/20 0-5 * * *'
  workflow_dispatch:

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 feedparser nba_api

      - name: Run ParlAID scraper
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python scrape_nba.py

      - name: Validate outputs
        run: |
          python -c "
          import json
          with open('data.json') as f:
              d = json.load(f)
          print(f'data.json OK — {d[\"total_games\"]} games, updated {d[\"last_updated\"]}')
          tr = d.get('track_record', {})
          for k,v in tr.items():
              if isinstance(v, dict) and v.get('total', 0) > 0:
                  print(f'  {k}: {v[\"win_pct\"]}% W ({v[\"wins\"]}-{v[\"losses\"]}) ROI:{v[\"roi\"]}%')
          "

      - name: Commit and push
        run: |
          git config --global user.name "ParlAID-Bot"
          git config --global user.email "bot@parlaid.github.io"
          git add data.json results.json || true
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "⚡ ParlAID v4: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          )
