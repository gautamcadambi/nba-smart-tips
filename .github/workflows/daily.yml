name: ParlAID — NBA Sync v5

on:
  schedule:
    - cron: '*/20 11-13 * * *'
    - cron: '*/20 22-23 * * *'
    - cron: '*/20 0-5 * * *'
  workflow_dispatch:

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 feedparser nba_api

      - name: Run scraper
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python scrape_nba.py

      - name: Validate
        run: |
          python -c "
          import json
          with open('data.json') as f:
              d = json.load(f)
          print(f'OK — {d[\"total_games\"]} games, {d[\"last_updated\"]}')
          for g in d['games'][:3]:
              h2h = g.get('h2h',{})
              hf = g.get('form',{}).get('home',{})
              fat = g.get('fatigue',{}).get('home',{})
              print(f'  {g[\"game\"]:40s} H2H:{h2h.get(\"total_meetings\",0)} L10:{hf.get(\"wins\",\"?\")} fatigue:{fat.get(\"status\",\"?\")}({fat.get(\"source\",\"?\")})')
          "

      - name: Commit and push
        run: |
          git config --global user.name "ParlAID-Bot"
          git config --global user.email "bot@parlaid.github.io"
          git add data.json results.json || true
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "🏀 ParlAID v5: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          )
