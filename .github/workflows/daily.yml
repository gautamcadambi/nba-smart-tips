name: Live NBA Dashboard Sync
on:
  schedule:
    - cron: '*/30 * * * *' # Updates every 30 minutes
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Dependencies
        run: pip install requests beautifulsoup4
      - name: Run Real-Time Scraper
        run: python scrape_nba.py
      - name: Deploy Update
        run: |
          git config --global user.name "NBA-Bot"
          git config --global user.email "bot@nba-smart-tips.com"
          git add data.json
          git commit -m "Real-time sync: $(date)" || exit 0
          git push
