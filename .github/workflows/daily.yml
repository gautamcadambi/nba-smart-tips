name: NBA Real-Time Update
on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Tools
        run: pip install requests beautifulsoup4
      - name: Run Scraper
        run: python scrape_nba.py
      - name: Update Site
        run: |
          git config --global user.name "NBA-Bot"
          git config --global user.email "bot@smart-tips.com"
          git add data.json
          git commit -m "Live ESPN Update [$(date)]" || exit 0
          git push
