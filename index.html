<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Smart Tips | Daily Betting Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .bet-card { transition: transform 0.2s; }
        .bet-card:hover { transform: translateY(-4px); }
    </style>
</head>
<body class="text-slate-200">

    <header class="bg-slate-900 border-b border-slate-800 py-8 px-4 shadow-2xl">
        <div class="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center">
            <div>
                <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-red-500">
                    🏀 NBA SMART TIPS
                </h1>
                <p class="text-slate-400 text-sm mt-1">Daily Intelligence & Odds Analysis</p>
            </div>
            <div class="mt-4 md:mt-0 text-right">
                <p id="update-time" class="text-xs font-mono text-slate-500 uppercase tracking-widest">Syncing Data...</p>
                <div class="mt-1 flex items-center justify-end">
                    <span class="flex h-2 w-2 rounded-full bg-green-500 mr-2 animate-pulse"></span>
                    <span class="text-xs font-bold text-green-500 uppercase">Live Systems</span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-6 mt-6">
        <div id="bet-container" class="grid gap-6 md:grid-cols-1">
            <div id="loading" class="py-20 text-center">
                <p class="text-slate-500 animate-pulse">Fetching latest NBA lines and injury reports...</p>
            </div>
        </div>
    </main>

    <footer class="mt-20 border-t border-slate-800 py-10 px-4 text-center">
        <p class="text-slate-500 text-xs">
            Data sourced from ESPN Odds. Analysis is for educational purposes only. 
            <br>Gamble responsibly. 18+.
        </p>
    </footer>

    <script>
        async function loadBets() {
            try {
                // Fetch the data from your data.json file
                const response = await fetch('data.json');
                const data = await response.json();
                
                document.getElementById('update-time').innerText = "Updated: " + data.last_updated;
                
                const container = document.getElementById('bet-container');
                container.innerHTML = ''; // Clear loading state
                
                data.bets.forEach(bet => {
                    const confidenceColor = bet.confidence.includes("Very High") ? "bg-green-600" : "bg-blue-600";
                    
                    const card = `
                        <div class="bet-card bg-slate-800 border border-slate-700 rounded-2xl overflow-hidden shadow-lg">
                            <div class="p-6">
                                <div class="flex justify-between items-start mb-6">
                                    <div>
                                        <h2 class="text-2xl font-bold text-white tracking-tight">${bet.game}</h2>
                                        <div class="flex gap-3 mt-2">
                                            <span class="text-xs font-bold bg-slate-700 px-2 py-1 rounded text-slate-300">SPREAD: ${bet.spread}</span>
                                            <span class="text-xs font-bold bg-slate-700 px-2 py-1 rounded text-slate-300 font-mono uppercase">ML: ${bet.odds}</span>
                                        </div>
                                    </div>
                                    <span class="${confidenceColor} text-[10px] px-3 py-1 rounded-full text-white font-black uppercase tracking-tighter">
                                        ${bet.confidence}
                                    </span>
                                </div>

                                <div class="grid md:grid-cols-2 gap-8">
                                    <div class="space-y-4">
                                        <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700/50">
                                            <p class="text-[10px] text-orange-400 font-black uppercase mb-1 tracking-widest">Recommended Bet</p>
                                            <p class="text-xl font-bold text-white">${bet.bet}</p>
                                        </div>
                                        <div>
                                            <p class="text-[10px] text-slate-500 font-black uppercase mb-2 tracking-widest text-center md:text-left">The Reasoning</p>
                                            <p class="text-slate-400 text-sm leading-relaxed">${bet.reasoning}</p>
                                        </div>
                                    </div>

                                    <div class="bg-red-950/20 border border-red-500/20 p-5 rounded-xl">
                                        <div class="flex items-center mb-3">
                                            <span class="text-red-500 mr-2 italic">⚠️</span>
                                            <p class="text-[10px] text-red-400 font-black uppercase tracking-widest">Real-Time Intel & Injuries</p>
                                        </div>
                                        <p class="text-slate-300 text-sm italic font-medium">"${bet.news}"</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            } catch (error) {
                document.getElementById('loading').innerHTML = `
                    <p class="text-red-400 font-bold">Failed to load betting data.</p>
                    <p class="text-slate-500 text-xs">The scraper might be running. Please refresh in 60 seconds.</p>
                `;
            }
        }
        loadBets();
    </script>
</body>
</html>
